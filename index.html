<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>小猫</title>

<style>
html, body {
	margin: 0;
	padding: 0;
	background: black;
	height: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
	overflow: hidden;
}

#canvas {
	width: 1000px;
	height: 500px;
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-progress, #status-notice {
	display: none;
}
</style>

<link rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

</head>

<body>

<canvas id="canvas"></canvas>

<noscript>
	Your browser does not support JavaScript.
</noscript>

<div id="status">
	<img id="status-splash" src="index.png" alt="">
	<progress id="status-progress"></progress>
	<div id="status-notice"></div>
</div>

<script src="index.js"></script>

<script>
const GODOT_CONFIG = {
	"args": [],
	"canvasResizePolicy": 0,  // ⭐ 关键修改：固定尺寸
	"emscriptenPoolSize": 8,
	"ensureCrossOriginIsolationHeaders": true,
	"executable": "index",
	"experimentalVK": false,
	"fileSizes": {"index.pck":20673772,"index.wasm":37695054},
	"focusCanvas": true,
	"gdextensionLibs": [],
	"godotPoolSize": 4
};

const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	function setStatusMode(mode) {
		if (mode === 'hidden') {
			statusOverlay.remove();
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
	}

	function displayFailureNotice(err) {
		console.error(err);
		statusNotice.innerText = err instanceof Error ? err.message : err;
		setStatusMode('notice');
	}

	setStatusMode('progress');

	engine.startGame({
		'onProgress': function (current, total) {
			if (current > 0 && total > 0) {
				statusProgress.value = current;
				statusProgress.max = total;
			}
		},
	}).then(() => {
		setStatusMode('hidden');
	}, displayFailureNotice);
}());
</script>

</body>
</html>
