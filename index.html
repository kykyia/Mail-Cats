<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>小猫</title>

<style>
html, body {
	margin: 0;
	padding: 0;
	background: black;
	height: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
	overflow: hidden;
}

#canvas {
	width: 1152px;
	height: 648px;
	display: block;
}

#canvas:focus {
	outline: none;
}
</style>

<link rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

</head>

<body>

<canvas id="canvas"></canvas>

<noscript>
	Your browser does not support JavaScript.
</noscript>

<script src="index.js"></script>

<script>
const GODOT_CONFIG = {
	"args": [],
	"canvasResizePolicy": 0, // ⭐ 固定尺寸
	"emscriptenPoolSize": 8,
	"ensureCrossOriginIsolationHeaders": true,
	"executable": "index",
	"experimentalVK": false,
	"fileSizes": {"index.pck":20673772,"index.wasm":37695054},
	"focusCanvas": true,
	"gdextensionLibs": [],
	"godotPoolSize": 4
};

const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

// ⭐ 强制锁死尺寸（防止 Godot 覆盖）
window.addEventListener("load", function () {
	const canvas = document.getElementById("canvas");

	canvas.width = 1152;
	canvas.height = 648;

	canvas.style.width = "1152px";
	canvas.style.height = "648px";
});

engine.startGame();
</script>

</body>
</html>
